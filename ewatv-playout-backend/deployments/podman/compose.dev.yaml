# Dev compose — plain passwords (no Podman secrets required)
# Usage: podman compose -f deployments/podman/compose.dev.yaml up -d

name: ewatv-playout-dev

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: ewatv-postgres-dev
    environment:
      POSTGRES_USER: ewatv
      POSTGRES_PASSWORD: ewatv
      POSTGRES_DB: ewatv_playout
    volumes:
      - ewatv_pgdata_dev:/var/lib/postgresql/data:Z
      - ../../migrations/001_foundation.up.sql:/docker-entrypoint-initdb.d/001_foundation.sql:ro,Z
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ewatv -d ewatv_playout"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: ewatv-redis-dev
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

volumes:
  ewatv_pgdata_dev:
