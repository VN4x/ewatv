# ewatv playout stack: MistServer + playlist writer + Caddy (TLS at edge).
# Defaults match Mist docs: API 4242, HLS/HTTP 8080.
#
# Usage:
#   cp .env.example .env && edit secrets
#   docker compose up -d
#   Open http://localhost:4242 once to finish Mist first-time setup (or mount config/mist.json)

services:
  mist:
    image: ddvtech/mistserver:latest
    container_name: ewatv-mist
    restart: unless-stopped
    shm_size: 2g
    ports:
      - "${MIST_API_HOST_PORT:-4242}:4242"
      - "${MIST_HTTP_HOST_PORT:-8080}:8080"
    volumes:
      - ./config/mist.json:/config.json
      - ./media:/media:ro
      - ./playlists:/playlists
    networks:
      - ewatv-playout

  playlist-sync:
    build: ./playlist-sync
    container_name: ewatv-playlist-sync
    restart: unless-stopped
    environment:
      PLAYLIST_DIR: /playlists
      MIST_API_URL: http://mist:4242
      MIST_API_USER: ${MIST_API_USER:-admin}
      MIST_API_PASSWORD: ${MIST_API_PASSWORD:-changeme}
      PLAYLIST_SYNC_TOKEN: ${PLAYLIST_SYNC_TOKEN:-dev-sync-token}
      PORT: "8787"
    volumes:
      - ./playlists:/playlists
      - ./media:/media:ro
    depends_on:
      - mist
    networks:
      - ewatv-playout

  caddy:
    image: caddy:2-alpine
    container_name: ewatv-caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mist
      - playlist-sync
    networks:
      - ewatv-playout

networks:
  ewatv-playout:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
